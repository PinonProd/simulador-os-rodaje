name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inyectar configuración real de Firebase (desde Secret)
        env:
          FIREBASE_CONFIG_JS: ${{ secrets.FIREBASE_CONFIG_JS }}
        run: |
          if [ -n "$FIREBASE_CONFIG_JS" ]; then
            printf '%s\n' "$FIREBASE_CONFIG_JS" > js/firebase-config.js
          else
            echo "::warning::No se configuró el secret FIREBASE_CONFIG_JS — se publica con la configuración local (modo sin control remoto real)."
          fi

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
